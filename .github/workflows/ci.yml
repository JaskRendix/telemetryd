name: CI

on:
  push:
  pull_request:

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    steps:
    - name: Check out Repository Codebase
      uses: actions/checkout@v6

    - name: Set up Python 3.12 Runtime
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip' 

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[test]

    - name: Execute Full Automated Test Suite
      run: |
        pytest -v